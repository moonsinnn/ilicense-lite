services:
  mysql:
    image: mysql:8.4
    container_name: ilicense-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-demo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql
      - ./app/script/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "3306:3306"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: ilicense-app
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MYSQL_DB_NAME: ${MYSQL_DB_NAME:-demo}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_ADDRESS: ${MYSQL_ADDRESS:-mysql:3306}
      LICENSE_MASTER_KEY: ${LICENSE_MASTER_KEY:-change-me-in-production}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ilicense-web
    restart: unless-stopped
    environment:
      NUXT_API_BASE: ${NUXT_API_BASE:-http://app:8080}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    depends_on:
      - app
    ports:
      - "3000:3000"

volumes:
  mysql_data:
