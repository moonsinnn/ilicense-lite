app:
  name: gin-app
  port: 8080
  jwt_secret: "change-me-in-production"

log:
  name: gin-app
  level: info
  model: file
  dir: /app/logs

mysql_db:
  log_file: "/app/logs/sql.log"
  log_slow_threshold: 1000
  colorful: false
  data_source:
    db_driver: "mysql"
    db_name: "demo"
    user_name: "root"
    password: "123456"
    address: "mysql:3306"
    conn_timeout: 3000
    read_timeout: 3000
    write_timeout: 3000
    max_open_conn: 20
    max_idle_conn: 10
    conn_max_life_time: 60000
    params:
      - key: "charset"
        value: "utf8mb4"
