app:
  name: gin-app
  port: 8080
  jwt_secret: "replace-with-strong-secret"

log:
  name: gin-app
  level: info
  model: file
  dir: logs

mysql_db:
  log_file: "logs/sql.log"
  log_slow_threshold: 1000
  colorful: false
  data_source:
    db_driver: "mysql"
    db_name: "demo"
    user_name: "root"
    password: "replace-with-db-password"
    address: "127.0.0.1:3306"
    conn_timeout: 1000
    read_timeout: 1000
    write_timeout: 1000
    max_open_conn: 10
    max_idle_conn: 10
    conn_max_life_time: 1000
    params:
      - key: "charset"
        value: "utf8mb4"
